services:
  # ── Backend API (Python Web Service) ────────────────────────────────────────
  - type: web
    name: sheguard-api
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && pip install -e forensic_ai || true"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOWED_ORIGINS
        value: "https://sheguard-app.onrender.com"
      - key: DASHBOARD_PIN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sheguard-db
          property: connectionString

  # ── Frontend React Static Site ───────────────────────────────────────────────
  - type: web
    name: sheguard-app
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://sheguard-api.onrender.com"
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /api/*
        destination: https://sheguard-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sheguard-db
    postgresMajorVersion: "15"
    plan: free
